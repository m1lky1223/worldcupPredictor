version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: worldcup-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: worldcup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: worldcup-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: worldcup-api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/worldcup
      REDIS_URL: redis://redis:6379
      GRAPHQL_PORT: 4000
    volumes:
      - .:/app
      - /app/node_modules
    command: npx tsx watch apps/api/src/index.ts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: worldcup-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GRAPHQL_URL: http://api:4000/graphql
      WEB_PORT: 3000
      PORT: 3000
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm --filter @worldcup/web dev
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: worldcup-worker
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/worldcup
      REDIS_URL: redis://redis:6379
      PROVIDER_MODE: mock
    volumes:
      - .:/app
      - /app/node_modules
    command: npx tsx watch apps/worker/src/index.ts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: infra/docker/mcp.Dockerfile
    container_name: worldcup-mcp
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/worldcup
      REDIS_URL: redis://redis:6379
      PORT: 4001
    volumes:
      - .:/app
      - /app/node_modules
    command: npx tsx watch apps/mcp/src/index.ts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
